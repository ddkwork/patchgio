name: Force Update Fork

on:
  push:
    branches:
      - master
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # 每天自动更新

jobs:
  nuclear-update:
    runs-on: ubuntu-latest
    steps:
      # 1. 设置环境变量
      - name: Set up environment
        run: |
          echo "GH_USER=ddkwork" >> $GITHUB_ENV
          echo "UPSTREAM_URL=https://github.com/gioui/gio" >> $GITHUB_ENV
          echo "FORK_URL=https://github.com/${{ env.GH_USER }}/gio" >> $GITHUB_ENV

      # 2. 克隆上游仓库
      - name: Clone upstream
        run: |
          git clone --depth=1 $UPSTREAM_URL gio
          cd gio
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
        shell: bash

      # 3. 检出当前仓库获取补丁文件
      - name: Checkout current repo
        uses: actions/checkout@v5
        with:
          path: current-repo

      # 4. 简化 GitHub CLI 认证
      - name: Setup GitHub CLI
        run: |
          gh auth status || true  # 忽略未登录的错误
          echo "GH_TOKEN=${{ secrets.tk }}" >> $GITHUB_ENV
        shell: bash

      # 5. 应用补丁并推送（修复版）
      - name: Apply patch and push
        run: |
          cp "current-repo/dropfile.patch" "gio"
          cp "current-repo/使用矩阵跟踪锚点绝对坐标.patch" "gio"
          cd gio
          
          git add .
          git commit -m "添加补丁文件 $(date +'%Y-%m-%d %H:%M')"
          
          git apply "dropfile.patch"
          git add .
          git commit -m "拖放文件支持 $(date +'%Y-%m-%d %H:%M')"
          
          git apply "使用矩阵跟踪锚点绝对坐标.patch"
          git add .
          git commit -m "使用矩阵跟踪锚点绝对坐标 $(date +'%Y-%m-%d %H:%M')"

          # 克隆 gio-cmd 到 cmd 目录
          git clone https://github.com/gioui/gio-cmd cmd
          rm -rf cmd/.git cmd/go.mod cmd/go.sum
          git add cmd
          git commit -m "添加 cmd 目录 $(date +'%Y-%m-%d %H:%M')"

          # 克隆 gio-x 到 x 目录
          git clone https://github.com/gioui/gio-x x
          rm -rf x/.git x/go.mod x/go.sum
          git add x
          git commit -m "添加 x 目录 $(date +'%Y-%m-%d %H:%M')"

          # 克隆 gio-example 到 example 目录
          git clone https://github.com/gioui/gio-example example
          rm -rf example/.git example/go.mod example/go.sum
          git add example
          git commit -m "添加 example 目录 $(date +'%Y-%m-%d %H:%M')"

          # 克隆 gio-shader 到 shader 目录
          git clone https://git.sr.ht/~eliasnaur/gio-shader shader
          rm -rf shader/.git shader/go.mod shader/go.sum
          git add shader
          git commit -m "添加 shader 目录 $(date +'%Y-%m-%d %H:%M')"

          # 克隆 gio-cpu 到 cpu 目录
          git clone https://git.sr.ht/~eliasnaur/gio-cpu cpu
          rm -rf cpu/.git cpu/go.mod cpu/go.sum
          git add cpu
          git commit -m "添加 cpu 目录 $(date +'%Y-%m-%d %H:%M')"

          # 运行 go mod tidy
          go mod tidy
          git add go.mod go.sum
          git commit -m "运行 go mod tidy $(date +'%Y-%m-%d %H:%M')"
                   
          # 设置远程地址
          git remote set-url origin "$FORK_URL"
          
          # 使用令牌进行推送
          echo "强制推送到 $FORK_URL..."
          git push --force "https://$GH_USER:$GH_TOKEN@github.com/$GH_USER/gio.git" main
          
          echo "更新完成!"
        shell: bash
        env:
          GH_USER: ${{ env.GH_USER }}
          GH_TOKEN: ${{ env.GH_TOKEN }}
          PATCH_FILE: ${{ env.PATCH_FILE }}