name: Update Gio

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

env:
  RELEASE_ZIP_FILE_NAME: gio

jobs:
  update-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          check-latest: true

      - name: Configure Git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git config --global format.encodeEmailHeaders false
          git config --global core.quotepath false
          git config --global i18n.logOutputEncoding utf-8

      - name: Update gio repository
        env:
          GH_TOKEN: ${{ secrets.tk }}
          GH_USER: ddkwork
        run: |
          set -e

          echo "=== 开始更新 gio 仓库 ==="

          echo "=== 克隆 gio 仓库 ==="
          git clone https://github.com/gioui/gio gio

          cd gio

          # 更新 .gitignore
          echo ".idea" >> .gitignore
          echo "*.cmd" >> .gitignore
          echo "*.log" >> .gitignore
          echo "*.ps1" >> .gitignore

          # 清理 .gitignore 中的空行和重复行
          sort -u .gitignore | grep -v '^$' > .gitignore.tmp
          mv .gitignore.tmp .gitignore

          # 创建新的 go.mod
          cat > go.mod << 'EOF'
          module gioui.org

          go 1.26.2

          ignore (
          	example
          	shader
          )
          EOF

          echo "=== 运行 go mod tidy ==="
          timeout 600s go mod tidy || {
            echo "go mod tidy 超时或失败，继续执行..."
          }

          echo "=== 降级有问题的依赖 ==="
          go get github.com/go-text/typesetting@v0.3.0 || true

          echo "=== 提交依赖更改 ==="
          git add .
          if git diff --cached --quiet; then
            echo "没有依赖更改需要提交"
          else
            git commit -m "更新依赖"
          fi

          echo "=== 应用补丁 ==="
          cd ..

          for patch_file in export_patch/gio/*.patch; do
            if [ -f "$patch_file" ]; then
              patch_name=$(basename "$patch_file")
              echo "应用补丁: $patch_name"
              
              cd gio
              if git apply --whitespace=fix "../$patch_file"; then
                git add .
                
                commit_msg=$(echo "$patch_name" | sed 's/^[0-9]\{4\}[-_]//' | sed 's/\.patch$//')
                
                if git diff --cached --quiet; then
                  echo "补丁没有产生更改: $patch_name"
                else
                  git commit -m "$commit_msg"
                  echo "已提交: $commit_msg"
                fi
              else
                echo "警告: 补丁应用失败 $patch_name"
              fi
              cd ..
            fi
          done

          echo "=== 推送到 fork ==="
          cd gio

          if [ -n "$GH_TOKEN" ]; then
            push_url="https://${GH_USER}:${GH_TOKEN}@github.com/${GH_USER}/gio.git"
            git push --force "$push_url" HEAD:main
            echo "推送成功"
          else
            echo "警告: GH_TOKEN 未设置，跳过推送"
          fi

          echo "=== gio 更新完成 ==="

      - name: Build dynamic tag
        id: tag
        shell: bash
        run: |
          cd gio
          SHA_SHORT=${{ github.sha }}
          SHA_SHORT=${SHA_SHORT:0:12}
          DATE=$(date +%Y%m%d%H%M)
          echo "tag=v0.0.0-${DATE}-${SHA_SHORT}" >> $GITHUB_OUTPUT

      - name: Delete old tags
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 1
          delete_tag_pattern: v0.0.0-*
          repository: ddkwork/gio
        env:
          GITHUB_TOKEN: ${{ secrets.tk }}

      - name: Push new tag
        run: |
          cd gio
          git config user.name CI
          git config user.email ci@github.com
          git tag ${{ steps.tag.outputs.tag }}

          if [ -n "${{ secrets.tk }}" ]; then
            push_url="https://ddkwork:${{ secrets.tk }}@github.com/ddkwork/gio.git"
            git push "$push_url" ${{ steps.tag.outputs.tag }}
          fi

      - name: Zip source
        run: |
          cd gio
          zip -r ../${{ env.RELEASE_ZIP_FILE_NAME }}-${{ steps.tag.outputs.tag }}.zip . -x '.git/**'

      - name: Release to fork
        env:
          GH_TOKEN: ${{ secrets.tk }}
        run: |
          gh release create ${{ steps.tag.outputs.tag }} \
            --repo ddkwork/gio \
            --title "gio Latest Stable" \
            --notes "Automated release from patchgio workflow" \
            ${{ env.RELEASE_ZIP_FILE_NAME }}-${{ steps.tag.outputs.tag }}.zip
